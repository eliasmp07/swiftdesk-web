<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>SwiftDesk</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A1F25">

    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SwiftDesk">

    <style>
        :root {
            /* Overwritten by JS below with the real viewport height — CSS 100%/100vh
               is unreliable in iOS standalone (installed) mode specifically, where
               WebKit doesn't keep them in sync with the actual visible area. */
            --app-height: 100%;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1A1F25;
            /* iOS Safari (especially standalone/installed PWAs) can still rubber-band
               scroll the whole page even with overflow:hidden — position:fixed is the
               reliable way to lock it in place so only Compose's own internal
               scrolling (lists, etc.) responds to touch. */
            position: fixed;
            inset: 0;
        }
        body {
            height: var(--app-height);
            box-sizing: border-box;
            /* Respect the notch/Dynamic Island safe area — only non-zero when running
               standalone on iOS, since that's the only mode where content draws
               under it at all. */
            padding-top: env(safe-area-inset-top);
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            touch-action: none;
        }
    </style>
    <script>
        function setAppHeight() {
            document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
        }
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 100));
        setAppHeight();
    </script>
</head>
<body>
<script src="webApp.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>
</body>
</html>
